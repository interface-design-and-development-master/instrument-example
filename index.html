<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Specialisation Synth 01</title>
<!--    <link rel="icon" type="image/png" href="./assets/favicon.png">-->

    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="keyboardControllerStyle.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/15.3.5/Tone.js" integrity="sha512-F1myjNkIKU5XJtOs1HXRo/zOjiUsABgFEEGKLx/riwK82jRThZFebEnfF2HWo9eeC+iC1Nwwnn9Vj6OGq+r7rQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="main.js" defer></script>
    <script src="keyboardController.js" defer></script>
</head>
<body>

<dialog id="intro-dialog">
    <p>Hey this page wants to make some noise, is that OK?</p>
    <button id="dialog-close-button" autofocus>That's OK</button>
</dialog>

<main>
    <section class="infoSection">
        <h1>Specialisation Synth 01</h1>
    </section>

    <section class="outputSection">
        <h2>Output</h2>
        <div class="rangeInputBox">
            <div class="rangeSliderBox">
                <span>Min</span>
                <input type="range" name="volume" id="volume-slider"
                       min="-32" max="0">
                <span>Max</span>
            </div>
            <label for="volume-slider">Volume</label>
        </div>
        
    </section>

    <section class="timbreSection">
        <h2>Timbre</h2>
        <fieldset>
            <legend>Select a wave form:</legend>

            <label>
                <input type="radio" id="sine-select" class="waveformSelect" name="waveform" value="sine" />
                <svg id="sine-svg" width="1.5rem" height="1.5rem" viewBox="0 0 100 100"
                     xmlns="http://www.w3.org/2000/svg">
                    <path stroke="var(--col01)" stroke-width="0.25rem" fill-opacity="0"
                          d="M 0,50
                             Q 25,0 50,50
                             Q 75,100 100,50
                             "/>
                </svg>
                Sine
            </label>

            <label>
                <input type="radio" id="square-select" class="waveformSelect" name="waveform" value="square" />
                <svg id="sine-svg" width="1.5rem" height="1.5rem" viewBox="0 0 100 100"
                     xmlns="http://www.w3.org/2000/svg">
                    <path stroke="var(--col01)" stroke-width="0.25rem" fill-opacity="0"
                          d="M 3,75
                             L 3,25
                             L 50,25
                             L 50,75
                             L 97,75
                             L 97,25
                             "/>
                </svg>
                Square
            </label>

            <label>
                <input type="radio" id="triangle-select" class="waveformSelect" name="waveform" value="triangle" />
                <svg id="sine-svg" width="1.5rem" height="1.5rem" viewBox="0 0 100 100"
                     xmlns="http://www.w3.org/2000/svg">
                    <path stroke="var(--col01)" stroke-width="0.25rem" fill-opacity="0"
                          d="M 3,75
                             L 33,25
                             L 66,75
                             L 97,25
                             "/>
                </svg>
                Triangle
            </label>

            <label>
                <input type="radio" id="sawtooth-select" class="waveformSelect" name="waveform" value="sawtooth" />
                <svg id="sine-svg" width="1.5rem" height="1.5rem" viewBox="0 0 100 100"
                     xmlns="http://www.w3.org/2000/svg">
                    <path stroke="var(--col01)" stroke-width="0.25rem" fill-opacity="0"
                          d="M 3,35
                             L 50,75
                             L 50,25
                             L 97,65
                             "/>
                </svg>
                Sawtooth
            </label>

        </fieldset>
        <fieldset>
            <legend>Filter:</legend>

            <label>
                Filter Type
                <select name="filter-types" id="filter-types-select">
                    <option value="lowpass">Lowpass</option>
                    <option value="highpass">Highpass</option>
                    <option value="bandpass">Bandpass</option>
                    <option value="notch">Notch</option>
                </select>
            </label>

            <label>
                <input type="range" name="attack" id="filter-freq-slider" min="0" max="20000">
                Frequency
            </label>

            <label>
                <input type="range" name="attack" id="filter-q-slider" min="0" max="20" step="0.01">
                Q
            </label>

        </fieldset>
    </section>

    <section class="envelopeSection">
        <h2>Envelope</h2>
        <div class="adsrBox">
            <svg id="adsr-svg-canvas" width="100%" height="100%" viewBox="0 0 100 25"
                 xmlns="http://www.w3.org/2000/svg">

                <polyline id="adsr-line" points="" stroke="var(--col01)" stroke-width="0.025rem" fill-opacity="0"></polyline>

            </svg>
        </div>

        <label>
            <input type="range" name="attack" id="attack-slider" class="envelopeSlider" data-env="attack"
                   min="0" max="10" step="0.01">
            <span id="attack-value"></span>
            Attack
        </label>

        <label>
            <input type="range" name="decay" id="decay-slider" class="envelopeSlider" data-env="decay"
                   min="0" max="10" step="0.01">
            <span id="decay-value"></span>
            Decay
        </label>

        <label>
            <input type="range" name="sustain" id="sustain-slider" class="envelopeSlider" data-env="sustain"
                   min="0" max="1" step="0.01">
            <span id="sustain-value"></span>
            Sustain
        </label>

        <label>
            <input type="range" name="release" id="release-slider" class="envelopeSlider" data-env="release"
                   min="0" max="10" step="0.01">
            <span id="release-value"></span>
            Release
        </label>
    </section>

    <section class="keyboardSection">
        <!--
        This is a template for a keyboard controller : we will look at building this style of
        input in class, but feel free to reference my code pattern. I've modularised the CSS &
        JS portions into their own file, but they rely on an HTML structure like that below.
        -->
        <div class="keyboardContainer">
            <div class="octaveContainer" data-octave="3">
                <div class="whiteKeyContainer">
                    <button class="whiteKey" data-note="c"></button>
                    <button class="whiteKey" data-note="d"></button>
                    <button class="whiteKey" data-note="e"></button>
                    <button class="whiteKey" data-note="f"></button>
                    <button class="whiteKey" data-note="g"></button>
                    <button class="whiteKey" data-note="a"></button>
                    <button class="whiteKey" data-note="b"></button>
                </div>
                <div class="blackKeyContainer">
                    <div class="blackKeySpacer"></div>
                    <button class="blackKey" data-note="c#"></button>
                    <button class="blackKey" data-note="d#"></button>
                    <div class="blackKeySpacer"></div>
                    <div class="blackKeySpacer"></div>
                    <button class="blackKey" data-note="f#"></button>
                    <button class="blackKey" data-note="g#"></button>
                    <button class="blackKey" data-note="a#"></button>
                    <div class="blackKeySpacer"></div>
                </div>
            </div>

            <div class="octaveContainer" data-octave="4">
                <div class="whiteKeyContainer">
                    <button class="whiteKey" data-note="c"></button>
                    <button class="whiteKey" data-note="d"></button>
                    <button class="whiteKey" data-note="e"></button>
                    <button class="whiteKey" data-note="f"></button>
                    <button class="whiteKey" data-note="g"></button>
                    <button class="whiteKey" data-note="a"></button>
                    <button class="whiteKey" data-note="b"></button>
                </div>
                <div class="blackKeyContainer">
                    <div class="blackKeySpacer"></div>
                    <button class="blackKey" data-note="c#"></button>
                    <button class="blackKey" data-note="d#"></button>
                    <div class="blackKeySpacer"></div>
                    <div class="blackKeySpacer"></div>
                    <button class="blackKey" data-note="f#"></button>
                    <button class="blackKey" data-note="g#"></button>
                    <button class="blackKey" data-note="a#"></button>
                    <div class="blackKeySpacer"></div>
                </div>
            </div>

        </div>
    </section>
</main>

</body>
</html>
