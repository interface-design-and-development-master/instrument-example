<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Information Design Exercise</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png">

    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="keyboardControllerStyle.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/15.3.5/Tone.js" integrity="sha512-F1myjNkIKU5XJtOs1HXRo/zOjiUsABgFEEGKLx/riwK82jRThZFebEnfF2HWo9eeC+iC1Nwwnn9Vj6OGq+r7rQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="main.js" defer></script>
    <script src="keyboardController.js" defer></script>
</head>
<body>

<dialog id="intro-dialog">
    <p>Hey this page wants to make some noise, is that OK?</p>
    <button id="dialog-close-button" autofocus>That's OK</button>
</dialog>

<main>

    <h1>Specialisation Synth 01</h1>

    <label>
        <input type="range" name="volume" id="volume-slider" min="-32" max="0">
        Volume
    </label>


    <fieldset>
        <legend>Select a wave form:</legend>

        <label>
            <input type="radio" id="sine-select" class="waveformSelect" name="waveform" value="sine" />
            Sine
        </label>

        <label>
            <input type="radio" id="square-select" class="waveformSelect" name="waveform" value="square" />
            Square
        </label>

        <label>
            <input type="radio" id="triangle-select" class="waveformSelect" name="waveform" value="triangle" />
            Triangle
        </label>

        <label>
            <input type="radio" id="sawtooth-select" class="waveformSelect" name="waveform" value="sawtooth" />
            Sawtooth
        </label>

    </fieldset>

    <fieldset>
        <legend>Envelope:</legend>

        <label>
            <input type="range" name="attack" id="attack-slider" class="envelopeSlider" data-env="attack"
                   min="0" max="10" step="0.001">
            Attack
        </label>

        <label>
            <input type="range" name="attack" id="decay-slider" class="envelopeSlider" data-env="decay"
                   min="0" max="10" step="0.001">
            Decay
        </label>

        <label>
            <input type="range" name="attack" id="sustain-slider" class="envelopeSlider" data-env="sustain"
                   min="0" max="1" step="0.01">
            Sustain
        </label>

        <label>
            <input type="range" name="attack" id="release-slider" class="envelopeSlider" data-env="release"
                   min="0" max="10" step="0.001">
            Release
        </label>
    </fieldset>




    <!--
    This is a template for a keyboard controller : we will look at building this style of
    input in class, but feel free to reference my code pattern. I've modularised the CSS &
    JS portions into their own file, but they rely on an HTML structure like that below.
    -->
    <div class="keyboardContainer">
        <div class="octaveContainer" data-octave="3">
            <div class="whiteKeyContainer">
                <button class="whiteKey" data-note="c"></button>
                <button class="whiteKey" data-note="d"></button>
                <button class="whiteKey" data-note="e"></button>
                <button class="whiteKey" data-note="f"></button>
                <button class="whiteKey" data-note="g"></button>
                <button class="whiteKey" data-note="a"></button>
                <button class="whiteKey" data-note="b"></button>
            </div>
            <div class="blackKeyContainer">
                <div class="blackKeySpacer"></div>
                <button class="blackKey" data-note="c#"></button>
                <button class="blackKey" data-note="d#"></button>
                <div class="blackKeySpacer"></div>
                <div class="blackKeySpacer"></div>
                <button class="blackKey" data-note="f#"></button>
                <button class="blackKey" data-note="g#"></button>
                <button class="blackKey" data-note="a#"></button>
                <div class="blackKeySpacer"></div>
            </div>
        </div>

        <div class="octaveContainer" data-octave="4">
            <div class="whiteKeyContainer">
                <button class="whiteKey" data-note="c"></button>
                <button class="whiteKey" data-note="d"></button>
                <button class="whiteKey" data-note="e"></button>
                <button class="whiteKey" data-note="f"></button>
                <button class="whiteKey" data-note="g"></button>
                <button class="whiteKey" data-note="a"></button>
                <button class="whiteKey" data-note="b"></button>
            </div>
            <div class="blackKeyContainer">
                <div class="blackKeySpacer"></div>
                <button class="blackKey" data-note="c#"></button>
                <button class="blackKey" data-note="d#"></button>
                <div class="blackKeySpacer"></div>
                <div class="blackKeySpacer"></div>
                <button class="blackKey" data-note="f#"></button>
                <button class="blackKey" data-note="g#"></button>
                <button class="blackKey" data-note="a#"></button>
                <div class="blackKeySpacer"></div>
            </div>
        </div>

    </div>

</main>

</body>
</html>
